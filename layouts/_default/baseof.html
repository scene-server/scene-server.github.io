    {{ $style := resources.Get "css/main.css" }}
    <link rel="stylesheet" href="{{ $style.RelPermalink }}">
</head>
<body>

    top: 20px;

    border: 2px solid #00ff00;

    color: #00ff00;
    text-decoration: none;
    font-family: monospace;
    font-size: 16px;

    align-items: center;
    gap: 8px;
">

    position: fixed;
    bottom: 20px;
    right: 20px;

">

        height: auto;

    ">
